<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fbfbfa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e1013" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="My Prayers" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>My Prayers</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; height: 100%; background: #fbfbfa; }
      @media (prefers-color-scheme: dark) {
        html, body { background: #0e1013; }
      }

      #mp-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        pointer-events: auto;
      }
      #mp-splash[data-state='exit'] { pointer-events: none; }
      .mp-splash-pane {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 50.5%;
        background: #fbfbfa;
        transition: transform 520ms cubic-bezier(0.7, 0, 0.2, 1);
      }
      @media (prefers-color-scheme: dark) {
        .mp-splash-pane { background: #0e1013; }
      }
      .mp-splash-left { left: 0; }
      .mp-splash-right { right: 0; }
      #mp-splash[data-state='exit'] .mp-splash-left { transform: translateX(-100%); }
      #mp-splash[data-state='exit'] .mp-splash-right { transform: translateX(100%); }

      .mp-splash-mark {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 56px;
        height: 56px;
        opacity: 1;
        transition: opacity 220ms ease;
      }
      #mp-splash[data-state='exit'] .mp-splash-mark { opacity: 0; }
      .mp-splash-mark::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 999px;
        border: 3px solid rgba(31, 138, 76, 0.18);
      }
      .mp-splash-mark::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 999px;
        border: 3px solid transparent;
        border-top-color: #1F8A4C;
        animation: mp-splash-spin 800ms linear infinite;
      }
      @keyframes mp-splash-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="mp-splash" aria-hidden="true">
      <div class="mp-splash-pane mp-splash-left"></div>
      <div class="mp-splash-pane mp-splash-right"></div>
      <div class="mp-splash-mark"></div>
    </div>
    <script>
      (function () {
        var splash = document.getElementById('mp-splash')
        if (!splash) return
        var minDelay = new Promise(function (r) { setTimeout(r, 350) })
        var fontsReady = (document.fonts && document.fonts.ready) || Promise.resolve()
        Promise.all([fontsReady, minDelay]).then(function () {
          requestAnimationFrame(function () {
            splash.setAttribute('data-state', 'exit')
            setTimeout(function () { splash.parentNode && splash.parentNode.removeChild(splash) }, 700)
          })
        })
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
